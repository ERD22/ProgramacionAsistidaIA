<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Diaria</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    
    <!-- Sección de Login/Registro -->
    <div id="authSection" class="bg-white rounded-lg shadow-md p-6 mb-8">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">📅 Agenda Diaria</h1>
      
      <!-- Tabs -->
      <div class="flex mb-6">
        <button id="loginTab" onclick="showLogin()" class="flex-1 py-2 px-4 bg-blue-500 text-white font-medium rounded-l-lg">Login</button>
        <button id="registerTab" onclick="showRegister()" class="flex-1 py-2 px-4 bg-gray-300 text-gray-700 font-medium rounded-r-lg">Registro</button>
      </div>
      
      <!-- Formulario Login -->
      <div id="loginForm">
        <form onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Email *</label>
            <input type="email" id="loginEmail" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Password *</label>
            <input type="password" id="loginPassword" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <button type="submit"
            class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors font-medium">
            Iniciar Sesión
          </button>
        </form>
      </div>
      
      <!-- Formulario Registro -->
      <div id="registerForm" class="hidden">
        <form onsubmit="handleRegister(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Email *</label>
            <input type="email" id="registerEmail" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Password *</label>
            <input type="password" id="registerPassword" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Nombre</label>
            <input type="text" id="registerNombre"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Apellido</label>
            <input type="text" id="registerApellido"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <button type="submit"
            class="w-full bg-green-500 text-white py-2 px-4 rounded-lg hover:bg-green-600 transition-colors font-medium">
            Registrarse
          </button>
        </form>
      </div>
    </div>
    
    <!-- Sección de Agenda (oculta hasta login) -->
    <div id="agendaSection" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">📅 Agenda Diaria</h1>
        <button onclick="logout()" class="bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600 transition-colors font-medium">
          Cerrar Sesión
        </button>
      </div>
      
      <!-- Formulario para agregar evento -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Nuevo Evento</h2>
      <form id="eventoForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Título *</label>
          <input type="text" id="titulo" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Descripción</label>
          <textarea id="descripcion" rows="2"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Fecha *</label>
            <input type="date" id="fecha" required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Hora</label>
            <input type="time" id="hora"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
        </div>
        <button type="submit"
          class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors font-medium">
          Agregar Evento
        </button>
      </form>
    </div>
    
    <!-- Lista de eventos -->
    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Eventos</h2>
      <div id="eventosList" class="space-y-3">
        <p class="text-gray-500 text-center">Cargando eventos...</p>
      </div>
    </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
